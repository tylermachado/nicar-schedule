<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Browse and explore the full schedule grid for NICAR 2026 conference sessions and events." />
		<meta name="robots" content="index, follow" />
		<meta name="theme-color" content="#000000" />
		
		<!-- Open Graph / Social Media -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="NICAR 2026 Schedule Grid" />
		<meta property="og:description" content="Browse and explore the full schedule grid for NICAR 2026 conference sessions and events." />
		<meta property="og:image" content="/social.png" />
		<meta property="og:url" content="https://tylermachado.com/nicar-schedule" />
		
		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="NICAR 2026 Schedule Grid" />
		<meta name="twitter:description" content="Browse and explore the full schedule grid for NICAR 2026 conference sessions and events." />
		<meta name="twitter:image" content="/social.png" />
		
		<!-- Canonical URL -->
		<link rel="canonical" href="https://tylermachado.com/nicar-schedule" />
		
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
